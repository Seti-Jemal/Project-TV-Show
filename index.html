<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>TV Show Project | Seti Mussa (Seti-Jemal)</title>
    <link href="style.css" rel="stylesheet" />
    <link rel="icon" href="favicon.ico" type="image/x-icon" />
  </head>

  <body>
    <main class="page">
      <header class="page-header">
        <h1>TV Show Project</h1>

        <button id="backToShowsButton" hidden>Back to shows</button>

        <div id="showsView">
          <input
            type="text"
            id="showSearchInput"
            placeholder="Search shows..."
          />
          <p id="showCount"></p>
          <section
            id="showsRoot"
            class="shows-grid"
            aria-label="List of TV shows"
          ></section>
        </div>

        <div id="episodesView" hidden>
          <p id="episode-count" class="episode-count"></p>

          <select id="showSelect">
            <option value="">Loading shows...</option>
          </select>

          <input
            type="text"
            id="searchInput"
            placeholder="Search episodes..."
          />

          <select id="episodeSelect">
            <option value="all">All Episodes</option>
          </select>

          <button id="clearFilters">Clear Filters</button>

          <p id="activeFilters"></p>
          <p id="helperMessage"></p>
        </div>

        <p id="loadingMessage"></p>
        <p id="errorMessage"></p>
      </header>

      <section
        id="root"
        class="episode-grid"
        aria-label="List of TV show episodes"
        hidden
      ></section>
    </main>

    <script src="script.js"></script>
  </body>
</html>
