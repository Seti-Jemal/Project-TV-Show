<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>TV Show Project | Seti Mussa (Seti-Jemal)</title>
    <link href="style.css" rel="stylesheet" />
    <link rel="icon" href="favicon.ico" type="image/x-icon" />
  </head>

  <body>
    <main class="page">
      <header class="page-header">
        <h1>TV Show Episodes</h1>

        <!-- Episode count -->
        <p id="episode-count" class="episode-count"></p>

        <!-- Show selector (NEW for Level 400) -->
        <select id="showSelect">
          <option value="">Loading shows...</option>
        </select>

        <!-- Search -->
        <input type="text" id="searchInput" placeholder="Search episodes..." />

        <!-- Episode dropdown -->
        <select id="episodeSelect">
          <option value="all">All Episodes</option>
        </select>

        <!-- Clear button -->
        <button id="clearFilters">Clear Filters</button>

        <!-- Messages -->
        <p id="activeFilters"></p>
        <p id="helperMessage"></p>
        <p id="loadingMessage"></p>
        <p id="errorMessage"></p>
      </header>

      <!-- Episodes container -->
      <section
        id="root"
        class="episode-grid"
        aria-label="List of TV show episodes"
      ></section>
    </main>

    <!-- IMPORTANT: remove this for level 300+ -->
    <!-- <script src="episodes.js"></script> -->

    <!-- Your script -->
    <script src="script.js"></script>
  </body>
</html>
